name: Mandatory Suite

# Closes the last open acceptance item of #507: "CI runs the same command from a
# clean checkout." This workflow runs the documented mandatory command from
# REPRODUCE.md on a fresh runner (setup-python provides the clean isolated
# environment the guide gets from a venv), so the reproducibility infrastructure
# from #555 / #581 / #584 is regression-guarded on every push and PR.
#
# Scope: this gate checks the general reproducibility infrastructure with the
# documented `--collect-only` command and executes the focused #566 and #314
# exact certificate/adversarial suites;
# a clean collection also proves the optional hardware/cloud lanes (IBM/Qiskit,
# CAMB, legacy D10) stay opt-in and fail closed without their credentials, since
# an accidentally-collected optional test would break the import and fail this job.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  mandatory:
    name: mandatory collection (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate claim registry
        run: python tools/check_claim_registry.py

      # #514: release-manifest membership is derived from the source set, and every
      # listed PDF must match its recorded sha256 + size_bytes. Runs unconditionally
      # here (every push/PR) so a manifest drift, a swapped/truncated artifact, or an
      # added/removed paper is rejected — a superset of manifest/validator/source-set/
      # PDF path triggers, so the check can never be bypassed by a path-filter miss.
      - name: Validate paper release manifest
        run: python tools/validate_paper_release_manifest.py

      - name: Regression-test the manifest validator
        run: python -m pytest -q tools/test_paper_release_manifest.py

      - name: Collect the mandatory scientific suite
        run: python -m pytest --collect-only code

      - name: Execute the conditional port-current certificate suite
        run: python -m pytest -q code/a5_closure/tests/test_port_current_inner_certificate.py

      - name: Execute the conditional matter-lift certificate suite
        run: python -m pytest -q code/a5_closure/tests/test_super_tannakian_matter_lift_certificate.py

      - name: Audit A5 closure ledgers
        run: python code/a5_closure/test_audit.py
