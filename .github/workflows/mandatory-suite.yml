name: Mandatory Suite

# Closes the last open acceptance item of #507: "CI runs the same command from a
# clean checkout." This workflow runs the documented mandatory command from
# REPRODUCE.md on a fresh runner (setup-python provides the clean isolated
# environment the guide gets from a venv), so the reproducibility infrastructure
# from #555 / #581 / #584 is regression-guarded on every push and PR.
#
# Scope: this gate checks the general reproducibility infrastructure with the
# documented `--collect-only` command;
# a clean collection also proves the optional hardware/cloud lanes (IBM/Qiskit,
# CAMB, legacy D10) stay opt-in and fail closed without their credentials, since
# an accidentally-collected optional test would break the import and fail this job.
#
# The two long-running exact-arithmetic certificate suites (#566 port-current,
# #314 matter-lift) used to run here on every push; they now live in
# certificate-suites.yml, which re-runs them only when their inputs under
# code/a5_closure/ change and on a nightly full-platform schedule. Keeping them
# out of this job drops it from ~27 min to ~1 min without dropping any gate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  mandatory:
    name: mandatory collection (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # #507: the mandatory suite is one documented command, identical here and
      # in REPRODUCE.md. It validates the claim registry (incl. live gates,
      # #512) and the release manifest (#514, unconditional on every push/PR so
      # manifest drift can never be bypassed by a path-filter miss), checks the
      # generated claims scoreboard, collects the full scientific suite, and
      # executes the fast audit fixtures.
      - name: Run the mandatory suite
        run: python tools/run_mandatory_suite.py
