name: Lean CI

on:
  workflow_dispatch:
  push:
    paths:
      - "Lean/**"
      - ".github/workflows/lean-ci.yml"
  pull_request:
    paths:
      - "Lean/**"
      - ".github/workflows/lean-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    # A cold runner rebuilds the OPH libraries after fetching the Mathlib
    # olean cache; 60 minutes cancelled three consecutive runs before the
    # package cache could ever be saved. 180 minutes lets one run succeed
    # and seed the cache; warm runs finish far below the limit.
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Print toolchain
        working-directory: Lean
        run: |
          lean --version
          lake --version

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: |
            Lean/.lake/packages
            Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/.lake/packages
          key: lake-${{ runner.os }}-${{ hashFiles('Lean/lean-toolchain', 'Lean/lakefile.lean', 'Lean/lake-manifest.json', 'Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/lean-toolchain', 'Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/lakefile.lean', 'Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Verify pinned dependency inputs
        working-directory: Lean
        run: |
          set -euo pipefail
          test -f lake-manifest.json
          grep -Fx 'leanprover/lean4:v4.29.1' lean-toolchain
          grep -F '"mathlib"' lake-manifest.json
          grep -F 'v4.29.1' lakefile.lean

      - name: Clean and fetch Mathlib cache
        working-directory: Lean
        run: |
          lake clean
          lake exe cache get || true

      - name: Build and check zero proof debt
        working-directory: Lean
        run: |
          set -euo pipefail
          lake build 2>&1 | tee lake-build.log

          if rg -n '^\s*(sorry|admit)\b|:=\s*(sorry|admit)\b' \
              . --glob '*.lean' --glob '!**/.lake/**'; then
            echo "Unexpected Lean admission in the umbrella project." >&2
            exit 1
          fi

          if rg -n '^\s*axiom\b|\bby\s+native_decide\b' \
              ObserverPatchHolography/Source/ObserverPatchHolography/EinsteinBranch \
              --glob '*.lean'; then
            echo "Unexpected global axiom or native_decide in the Einstein branch." >&2
            exit 1
          fi

          (
            cd ObserverPatchHolography/Proofs/ObservableNormalForms
            lake build
            if rg -n '^\s*(sorry|admit)\b|:=\s*(sorry|admit)\b' \
                ObservableNormalForms --glob '*.lean'; then
              echo "Unexpected admission in neutral submission artifact." >&2
              exit 1
            fi
          )

          sorry_warnings="$(grep -F 'declaration uses `sorry`' lake-build.log || true)"

          if [ -n "$sorry_warnings" ]; then
            echo "Unexpected Lean proof-debt state." >&2
            echo "Expected zero sorry warnings (the Primitives.lean admissions were discharged)." >&2
            echo "Actual sorry warnings:" >&2
            printf '%s\n' "$sorry_warnings" >&2
            exit 1
          fi

          grep -F "bare_consensus_not_einstein_complete' depends on axioms" lake-build.log
          grep -F "composedEinsteinBranch' depends on axioms" lake-build.log

          git diff --exit-code -- lean-toolchain lakefile.lean lake-manifest.json
