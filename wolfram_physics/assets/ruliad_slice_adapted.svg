<?xml version="1.0" encoding="UTF-8"?>
<!--
  Adapted visual inspired by the branching multiway/ruliad diagrams in
  Stephen Wolfram, "The Concept of the Ruliad" (2021), Wolfram Writings:
  https://writings.stephenwolfram.com/2021/11/the-concept-of-the-ruliad./
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Adapted Ruliad Slice and Observer-Semantic Quotient</title>
  <desc id="desc">A branching multiway graph inspired by Wolfram's ruliad diagrams, with many raw histories on the left and a smaller observer-semantic quotient on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f2f4ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c63d9"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a39de8"/>
    </marker>
    <style>
      .title { font: 700 26px Georgia, 'Times New Roman', serif; fill: #1b2240; }
      .subtitle { font: 400 14px Georgia, 'Times New Roman', serif; fill: #55607c; }
      .label { font: 700 15px Georgia, 'Times New Roman', serif; fill: #24304f; }
      .note { font: 400 13px Georgia, 'Times New Roman', serif; fill: #4e5975; }
      .tiny { font: 600 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #29427a; }
      .node { fill: #f5f7ff; stroke: #b9c6ec; stroke-width: 2; rx: 12; ry: 12; }
      .node-strong { fill: #eef2ff; stroke: #7c83ea; stroke-width: 2.5; rx: 14; ry: 14; }
      .edge { fill: none; stroke: #6c63d9; stroke-width: 2.1; stroke-linecap: round; marker-end: url(#arrow); opacity: 0.82; }
      .edge-soft { fill: none; stroke: #8c84e4; stroke-width: 1.7; stroke-linecap: round; marker-end: url(#arrow-soft); opacity: 0.5; }
      .edge-dashed { fill: none; stroke: #5663c7; stroke-width: 2.2; stroke-dasharray: 7 7; stroke-linecap: round; marker-end: url(#arrow); opacity: 0.9; }
      .panel { fill: rgba(255,255,255,0.8); stroke: #d6def5; stroke-width: 1.5; rx: 20; ry: 20; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="560" fill="url(#bg)"/>

  <text x="56" y="52" class="title">Ruliad Slice to Observer-Semantic Quotient</text>
  <text x="56" y="78" class="subtitle">Adapted from the visual language of Wolfram's branching ruliad diagrams, then specialized to the OPH bridge paper.</text>

  <rect x="42" y="108" width="654" height="392" class="panel"/>
  <rect x="734" y="108" width="424" height="392" class="panel"/>

  <text x="64" y="138" class="label">Many raw histories</text>
  <text x="756" y="138" class="label">Few observer-visible classes</text>

  <!-- Left panel nodes -->
  <rect x="315" y="154" width="110" height="38" class="node-strong"/>
  <text x="370" y="178" text-anchor="middle" class="tiny">seed state</text>

  <rect x="116" y="230" width="88" height="34" class="node"/>
  <text x="160" y="252" text-anchor="middle" class="tiny">h1a</text>
