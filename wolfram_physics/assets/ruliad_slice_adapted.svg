  <!-- Quotient arrow and label -->
  <path d="M648 300 C706 300, 734 300, 778 300" class="edge-dashed"/>
  <text x="715" y="286" text-anchor="middle" class="note">observer quotient and repair</text>

  <!-- Right panel nodes -->
  <rect x="852" y="196" width="188" height="46" class="node-strong"/>
  <text x="946" y="224" text-anchor="middle" class="tiny">class A</text>
